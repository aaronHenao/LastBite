name: lastbite
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.7
  go_router: ^13.0.0
  flutter_riverpod: ^2.5.0
  dio: ^5.9.0
  mobile_scanner: ^5.1.1
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  google_sign_in: 6.1.6
  firebase_messaging: ^16.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # Drift — base de datos local (offline-first)
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24

  # Conectividad — detectar si hay internet
  connectivity_plus: ^6.1.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generador de código para Drift
  build_runner: ^2.4.13
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true
